<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Games</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
      
    <div class="container">

        <!-- tart screen -->
        <div  class="screen active"" id="start-screen">
            <h1>Quiz Time</h1>
            <p>Tell your Knowldege with these questions</p>
            <button id="start-btn">Start-quiz</button>
        </div>


         <!-- quiz screen -->
        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Question goes here</h2>
                <div class="quiz-info">
                    <p>Question <span id="current-questions">1</span> of <span> 5</span></p>
                    <p>Score: <span id="score">0</span></p>

                </div>

                <div id="answers-container" class="answers-container">

                    <!-- answer button will be inserted here from our js code later at some point -->
                </div>

                <div class="progres-bar">
                    <div id="progress" class="progress"></div>
                </div>
             </div>
        </div>

        <!-- result screen -->
            <div id="result-screen" class="screen ">

                <h1>Quiz Results</h1>
                <div class="result-info">
                    <p>You scored <span id="final-score">0</span> out of <span id="max-score"></span></p>

                    <div id="result-message">Good job</div>
                    </div>
                    <button id="restart-btn">Restart Quiz</button>
                
            </div>
    </div>



    <script src="index.js"></script>
</body>
</html>
